<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmbodiedHead Live Demo</title>
  <style>
    :root {
      --bg: #ecf1f6;
      --card: rgba(255, 255, 255, 0.72);
      --card-strong: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
      --line-strong: rgba(15, 23, 42, 0.14);
      --text: #111827;
      --muted: #667085;
      --brand: #0f172a;
      --ok: #0f9d58;
      --warn: #b45309;
      --focus-ring: rgba(84, 132, 255, 0.28);
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
      --radius-xl: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(120, 151, 186, 0.2), transparent 38%),
        radial-gradient(circle at 100% 0%, rgba(182, 196, 213, 0.16), transparent 34%),
        linear-gradient(180deg, #fafcfe 0%, var(--bg) 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -120px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.85), transparent 34%),
        radial-gradient(circle at 78% 12%, rgba(255, 255, 255, 0.7), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(214, 225, 239, 0.4), transparent 40%);
      filter: blur(24px);
      pointer-events: none;
      z-index: -1;
    }

    .shell {
      width: min(1248px, 100%);
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: 408px 1fr;
      gap: 18px;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(22px) saturate(135%);
      -webkit-backdrop-filter: blur(22px) saturate(135%);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .settings {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .settings-top {
      display: grid;
      gap: 12px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
    }

    .settings-body {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 14px;
      padding: 14px 18px;
      align-content: start;
    }

    .title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.01em;
    }
    .status {
      font-size: 13px;
      color: var(--warn);
      font-weight: 600;
    }
    .status.ok { color: var(--ok); }
    .stage-status {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      line-height: 1;
      white-space: nowrap;
    }
    .status-row {
      display: flex;
      align-items: center;
      min-height: 18px;
    }

    .lang-toggle {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      color: var(--text);
      border-radius: 999px;
      min-width: 58px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .16s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease;
    }
    .lang-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
    }
    .lang-toggle:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .group {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-md);
    }
    .group label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background-color .16s ease;
    }
    input[type="text"]:hover {
      border-color: var(--line-strong);
      background: #fff;
    }
    input[type="text"]:focus {
      border-color: rgba(58, 95, 166, 0.45);
      box-shadow: 0 0 0 4px var(--focus-ring);
      background: #fff;
    }

    .picker {
      position: relative;
    }
    .picker-trigger {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(245, 248, 252, 0.92));
      color: var(--text);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .18s ease, background-color .16s ease;
    }
    .picker-trigger:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
    }
    .picker-trigger:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus-ring);
    }
    .picker-trigger:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }
    .picker-trigger-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .picker-trigger-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picker-trigger-meta {
      font-size: 11px;
      color: var(--muted);
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picker-caret {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.06);
      color: #475467;
      flex-shrink: 0;
    }
    .picker-caret svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mode-segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .mode-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      padding: 10px 10px 9px;
      text-align: left;
      display: grid;
      gap: 3px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .18s ease, background-color .16s ease;
    }
    .mode-chip:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 10px 16px rgba(15, 23, 42, 0.07);
    }
    .mode-chip.active {
      border-color: rgba(31, 41, 55, 0.42);
      background: linear-gradient(180deg, rgba(23, 31, 49, 0.96), rgba(15, 23, 42, 0.92));
      color: #fff;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.18);
    }
    .mode-chip:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus-ring);
    }
    .mode-chip:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }
    .mode-chip-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }
    .mode-chip-meta {
      font-size: 11px;
      line-height: 1.25;
      color: inherit;
      opacity: 0.72;
    }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid transparent;
      border-radius: 11px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(15, 23, 42, 0.08);
    }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus-ring);
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(180deg, #1f2937, #111827);
      border-color: rgba(17, 24, 39, 0.4);
      color: white;
      box-shadow: 0 10px 20px rgba(17, 24, 39, 0.2);
    }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.88);
      border-color: var(--line);
      color: #111827;
    }
    .btn.upload-action {
      background: linear-gradient(180deg, rgba(247, 250, 253, 0.96), rgba(238, 244, 249, 0.95));
      color: #334155;
      border-color: rgba(148, 163, 184, 0.45);
      box-shadow: 0 8px 14px rgba(15, 23, 42, 0.07);
    }
    .btn.upload-action:hover:not(:disabled) {
      border-color: rgba(100, 116, 139, 0.55);
      background: linear-gradient(180deg, #ffffff, rgba(240, 246, 252, 0.96));
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .picker-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 998;
    }
    .picker-overlay.show {
      display: flex;
    }
    .picker-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(10px) saturate(120%);
      -webkit-backdrop-filter: blur(10px) saturate(120%);
    }
    .picker-sheet {
      position: relative;
      width: min(520px, calc(100vw - 40px));
      max-height: min(76vh, 720px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: linear-gradient(180deg, rgba(251, 253, 255, 0.96), rgba(239, 245, 251, 0.94));
      box-shadow: 0 26px 60px rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .picker-sheet-head {
      padding: 18px 18px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(255, 255, 255, 0.54);
    }
    .picker-sheet-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      color: #667085;
      margin-bottom: 4px;
    }
    .picker-sheet-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }
    .picker-close {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      color: #475467;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .picker-options {
      padding: 12px 14px 16px;
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .picker-option {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .18s ease, background-color .16s ease;
    }
    .picker-option:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 23, 42, 0.08);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.08);
    }
    .picker-option.active {
      border-color: rgba(31, 41, 55, 0.24);
      background: linear-gradient(180deg, rgba(19, 28, 46, 0.96), rgba(15, 23, 42, 0.92));
      color: #fff;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.18);
    }
    .picker-option-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .picker-option-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }
    .picker-option-meta {
      font-size: 12px;
      line-height: 1.35;
      color: inherit;
      opacity: .72;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }
    .picker-option-check {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(15, 23, 42, 0.05);
      color: currentColor;
      font-size: 14px;
      flex-shrink: 0;
    }
    .picker-option.active .picker-option-check {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.12);
    }

    .identity-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }
    .identity-item {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      transition: transform .16s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .identity-item:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 10px 16px rgba(15, 23, 42, 0.08);
    }
    .identity-item.active {
      border-color: rgba(31, 41, 55, 0.55);
      box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.45);
    }
    .identity-item img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 10px;
      background: #f3f4f6;
    }
    .identity-item .name {
      font-size: 14px;
      font-weight: 600;
    }
    .identity-delete {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #fbc9c9;
      background: rgba(255, 245, 245, 0.95);
      color: #b42318;
      border-radius: 10px;
      padding: 0;
      cursor: pointer;
      transition: border-color .16s ease, background-color .16s ease, transform .16s ease;
    }
    .identity-delete:hover {
      background: #ffe9e9;
      border-color: #f5a8a8;
      transform: translateY(-1px);
    }
    .identity-delete svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .file-name {
      min-width: 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upload-format-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.72);
    }
    .self-test-stack {
      display: grid;
      gap: 10px;
    }
    .self-test-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }
    .self-test-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .self-test-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .self-test-card-meta {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }
    .self-test-badge {
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .self-test-badge.active {
      color: #0f9d58;
      border-color: rgba(15, 157, 88, 0.22);
      background: rgba(233, 250, 240, 0.98);
    }
    .self-test-badge.warn {
      color: #b45309;
      border-color: rgba(180, 83, 9, 0.22);
      background: rgba(255, 248, 235, 0.98);
    }
    .self-test-badge.error {
      color: #b42318;
      border-color: rgba(180, 35, 24, 0.2);
      background: rgba(255, 241, 241, 0.98);
    }
    .self-test-meter-list {
      display: grid;
      gap: 8px;
    }
    .self-test-meter-row {
      display: grid;
      gap: 6px;
    }
    .self-test-meter-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .self-test-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: linear-gradient(180deg, rgba(241, 245, 249, 0.94), rgba(226, 232, 240, 0.9));
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    .self-test-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      transition: width .12s ease;
    }
    .self-test-fill.server {
      background: linear-gradient(90deg, #0ea5e9, #2563eb);
    }
    .self-test-note {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.78);
    }
    .speaker-test-visual {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 24px;
      padding: 2px 0 0;
    }
    .speaker-test-bar {
      width: 7px;
      height: 18%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(37, 99, 235, 0.9), rgba(14, 165, 233, 0.9));
      transform-origin: center bottom;
      opacity: 0.4;
    }
    .speaker-test-visual.playing .speaker-test-bar {
      opacity: 1;
      animation: speakerPulse 0.9s ease-in-out infinite;
    }
    .speaker-test-visual.playing .speaker-test-bar:nth-child(2) {
      animation-delay: 0.08s;
    }
    .speaker-test-visual.playing .speaker-test-bar:nth-child(3) {
      animation-delay: 0.16s;
    }
    .speaker-test-visual.playing .speaker-test-bar:nth-child(4) {
      animation-delay: 0.24s;
    }
    .speaker-test-visual.playing .speaker-test-bar:nth-child(5) {
      animation-delay: 0.32s;
    }
    @keyframes speakerPulse {
      0%, 100% { transform: scaleY(0.35); }
      50% { transform: scaleY(1); }
    }

    .stage {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      min-height: 0;
    }
    .stage-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .video-wrap {
      width: 100%;
      min-height: 0;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(242,246,250,0.72));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
    }
    canvas {
      width: min(620px, 90%);
      max-height: calc(100vh - 220px);
      aspect-ratio: 1/1;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
      background: #000;
      object-fit: contain;
    }

    .stage-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

      justify-content: center;

      padding: 20px;

    }

      try {

    function int16FromFloat32(float32) {
      const out = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        let s = Math.max(-1, Math.min(1, float32[i]));
        out[i] = s < 0 ? s * 32768 : s * 32767;
      }
      return out;
    }

    function downsampleBuffer(buffer, inRate, outRate) {
      if (outRate === inRate) return buffer;
      const ratio = inRate / outRate;
      const newLen = Math.round(buffer.length / ratio);
      const out = new Float32Array(newLen);
      let offset = 0;
      for (let i = 0; i < newLen; i++) {
        const next = Math.round((i + 1) * ratio);
        let acc = 0;
        let count = 0;
        for (let j = offset; j < next && j < buffer.length; j++) {
          acc += buffer[j]; count++;
        }
        out[i] = count ? acc / count : 0;
        offset = next;
      }
      return out;
    }

    function stopSelfTestAudioPipeline() {
      if (selfTestProcessor) {
        selfTestProcessor.onaudioprocess = null;
        selfTestProcessor.disconnect();
        selfTestProcessor = null;
      }
      if (selfTestSource) {
        selfTestSource.disconnect();
        selfTestSource = null;
      }
      if (selfTestMediaStream) {
        for (const track of selfTestMediaStream.getTracks()) {
          track.stop();
        }
        selfTestMediaStream = null;
      }
      if (selfTestAudioContext) {
        selfTestAudioContext.close().catch(() => {});
        selfTestAudioContext = null;
      }
      selfTestPlaybackGainNode = null;
      selfTestPlaybackCursorSec = 0;
    }

    function setSelfTestLevels(localLevel, serverLevel) {

      selfTestServerLevel = clamp01(serverLevel);
      setMeterLevel(micSelfTestLocalFillEl, micSelfTestLocalValueEl, selfTestLocalLevel);
      setMeterLevel(micSelfTestServerFillEl, micSelfTestServerValueEl, selfTestServerLevel);
    }

    function finishMicSelfTest(nextStatus, errorMessage = "") {
      if (typeof nextStatus === "string" && nextStatus) {
        selfTestStatusCode = nextStatus;
      }
      selfTestErrorMessage = String(errorMessage || "");
      stopSelfTestAudioPipeline();
      selfTestWs = null;
      isSelfTestRunning = false;
      selfTestManualStopping = false;
      if (selfTestStatusCode !== "running") {
        setSelfTestLevels(0, 0);
      }
      setBusy(false);
      renderMicSelfTestUi();
      updateControls();
    }

    function playSelfTestEchoPcm(pcm) {
      if (!selfTestAudioContext || !selfTestPlaybackGainNode || !pcm || pcm.length === 0) return;
      const f32 = new Float32Array(pcm.length);
      for (let i = 0; i < pcm.length; i++) {
        f32[i] = pcm[i] / 32768.0;
      }
      const buf = selfTestAudioContext.createBuffer(1, f32.length, selfTestAudioSampleRate || 16000);
      buf.copyToChannel(f32, 0, 0);
      const srcNode = selfTestAudioContext.createBufferSource();
      srcNode.buffer = buf;
      srcNode.connect(selfTestPlaybackGainNode);
      const nowSec = selfTestAudioContext.currentTime;
      if (selfTestPlaybackCursorSec < nowSec + 0.02) {
        selfTestPlaybackCursorSec = nowSec + 0.02;
      }
      srcNode.start(selfTestPlaybackCursorSec);
      selfTestPlaybackCursorSec += buf.duration;
    }

    function stopMicSelfTest() {
      selfTestManualStopping = true;
      const socket = selfTestWs;
      finishMicSelfTest("idle");
      if (socket) {
        try { socket.close(); } catch (_) {}
      }
    }

    async function startMicSelfTest() {
      if (isSelfTestRunning || uiBusy || isRealtimeRunning || !hasBackendConnectionConfig()) return;
      stopSpeakerSelfTest();
      selfTestStatusCode = "preparing";
      selfTestErrorMessage = "";
      setSelfTestLevels(0, 0);
      renderMicSelfTestUi();
      setBusy(true);
      try {
        const socket = new WebSocket(resolveBackendWebSocketUrl("/ws/self-test"));
        selfTestWs = socket;
        socket.binaryType = "arraybuffer";

        socket.onopen = async () => {
          try {
            selfTestMediaStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
              },
            });
            if (selfTestWs !== socket || socket.readyState !== WebSocket.OPEN) {
              finishMicSelfTest("idle");
              return;
            }
            selfTestAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            selfTestPlaybackGainNode = selfTestAudioContext.createGain();
            selfTestPlaybackGainNode.gain.value = 0.92;
            selfTestPlaybackGainNode.connect(selfTestAudioContext.destination);
            selfTestPlaybackCursorSec = selfTestAudioContext.currentTime + 0.04;

            selfTestSource = selfTestAudioContext.createMediaStreamSource(selfTestMediaStream);
            selfTestProcessor = selfTestAudioContext.createScriptProcessor(2048, 1, 1);
            selfTestProcessor.onaudioprocess = (e) => {
              if (selfTestWs !== socket || socket.readyState !== WebSocket.OPEN || !selfTestAudioContext) return;
              const input = e.inputBuffer.getChannelData(0);
              let sum = 0;
              let peak = 0;
              for (let i = 0; i < input.length; i++) {
                const sample = input[i];
                sum += sample * sample;
                peak = Math.max(peak, Math.abs(sample));
              }
              const rms = input.length ? Math.sqrt(sum / input.length) : 0;
              selfTestLocalLevel = normalizeMeterLevel(rms, peak);
              setMeterLevel(micSelfTestLocalFillEl, micSelfTestLocalValueEl, selfTestLocalLevel);

              const mono16k = downsampleBuffer(input, selfTestAudioContext.sampleRate, 16000);
              const i16 = int16FromFloat32(mono16k);
              if (i16.length > 0) {
                socket.send(i16.buffer);
              }
            };
            selfTestSource.connect(selfTestProcessor);
            selfTestProcessor.connect(selfTestAudioContext.destination);
            isSelfTestRunning = true;
            selfTestStatusCode = "running";
            selfTestErrorMessage = "";
            renderMicSelfTestUi();
            setBusy(false);
            updateControls();
          } catch (e) {
            const msg = (e && e.message) ? e.message : e;
            const activeSocket = selfTestWs === socket ? socket : null;
            finishMicSelfTest("failed", msg || "-");
            if (activeSocket) {
              try { activeSocket.close(); } catch (_) {}
            }
          }
        };

        socket.onmessage = (event) => {
          if (selfTestWs !== socket) return;
          if (typeof event.data === "string") {
            try {
              const meta = JSON.parse(event.data);
              if (meta.type === "init") {
                selfTestAudioSampleRate = meta.audio_sample_rate || meta.sample_rate || 16000;
                return;
              }
              if (meta.type === "stats") {
                selfTestServerLevel = normalizeMeterLevel(meta.rms, meta.peak);
                setMeterLevel(micSelfTestServerFillEl, micSelfTestServerValueEl, selfTestServerLevel);
              }
            } catch (_) {}
            return;
          }

          if (!selfTestAudioContext) return;
          playSelfTestEchoPcm(new Int16Array(event.data));
        };

        socket.onclose = () => {
          if (selfTestWs !== socket) return;
          const nextStatus = selfTestStatusCode === "failed" ? "failed" : "idle";
          finishMicSelfTest(nextStatus, selfTestStatusCode === "failed" ? selfTestErrorMessage : "");
        };

        socket.onerror = () => {
          if (selfTestWs !== socket) return;
          selfTestStatusCode = "failed";
          selfTestErrorMessage = selfTestErrorMessage || t("statusError");
        };
      } catch (e) {
        finishMicSelfTest("failed", (e && e.message) ? e.message : e);
      }
    }

    function stopSpeakerSelfTest() {
      if (speakerTestAudio) {
        speakerTestAudio.pause();
        speakerTestAudio.src = "";
        speakerTestAudio = null;
      }
      isSpeakerTestPlaying = false;
      speakerTestStatusCode = "idle";
      speakerTestErrorMessage = "";
      renderSpeakerSelfTestUi();
      updateControls();
    }

    async function toggleSpeakerSelfTest() {
      if (isSpeakerTestPlaying) {
        stopSpeakerSelfTest();
        return;
      }
      if (uiBusy || isRealtimeRunning || isSelfTestRunning || !hasBackendConnectionConfig()) return;

      const audio = new Audio(resolveBackendUrl(`/api/self-test/tone.wav?ts=${Date.now()}`));
      audio.preload = "auto";
      audio.addEventListener("ended", () => {
        if (speakerTestAudio !== audio) return;
        stopSpeakerSelfTest();
      });
      audio.addEventListener("error", () => {
        if (speakerTestAudio !== audio) return;
        speakerTestAudio = null;
        isSpeakerTestPlaying = false;
        speakerTestStatusCode = "failed";
        speakerTestErrorMessage = t("statusError");
        renderSpeakerSelfTestUi();
        updateControls();
      });

      try {
        speakerTestAudio = audio;
        isSpeakerTestPlaying = true;
        speakerTestStatusCode = "playing";
        speakerTestErrorMessage = "";
        renderSpeakerSelfTestUi();
        updateControls();
        await audio.play();
      } catch (e) {
        speakerTestAudio = null;
        isSpeakerTestPlaying = false;
        speakerTestStatusCode = "failed";
        speakerTestErrorMessage = (e && e.message) ? e.message : e;
        renderSpeakerSelfTestUi();
        updateControls();
      }
    }

    async function fetchJSON(url, options={}) {
      const requestUrl = resolveBackendUrl(url);
      const res = await fetch(requestUrl, options);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `HTTP ${res.status}`);
      }
      return await res.json();
    }

    function syncIdentitySelection() {
      const items = identityListEl.querySelectorAll(".identity-item");
      for (const item of items) {
        const identityId = item.getAttribute("data-identity-id") || "";
        item.classList.toggle("active", identityId === selectedIdentityId);
      }
    }

    function renderIdentityList(identities) {
      identityListEl.innerHTML = "";
      for (const id of identities) {
        const item = document.createElement("div");
        item.setAttribute("data-identity-id", id.identity_id || "");
        item.className = "identity-item" + (id.identity_id === selectedIdentityId ? " active" : "");
        item.innerHTML = `
          <img src="${resolveBackendImageUrl(id.image_url)}" alt="${id.name || id.identity_id}" loading="lazy" decoding="async" />
          <div>
            <div class="name">${id.name || id.identity_id}</div>
          </div>
          <button class="identity-delete" type="button" aria-label="${t("deleteIdentity")}" title="${t("deleteIdentity")}">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
          </button>
        `;
        item.onclick = () => {
          if (isRealtimeRunning || uiBusy) return;
          if (selectedIdentityId === id.identity_id) return;
          selectedIdentityId = id.identity_id;
          syncIdentitySelection();
          persistSessionConfigDraft();
        };
        const delBtn = item.querySelector(".identity-delete");
        delBtn.onclick = async (e) => {
          e.stopPropagation();
          await deleteIdentity(id.identity_id, id.name || id.identity_id);
        };
        identityListEl.appendChild(item);
      }
    }

    async function deleteIdentity(identityId, displayName) {
      if (isRealtimeRunning || uiBusy) return;
      if (!confirm(t("confirmDelete1", { name: displayName }))) return;

      setBusy(true);
      try {
        const res = await fetch(resolveBackendUrl(`/api/identities/${encodeURIComponent(identityId)}`), {
          method: "DELETE",
        });
        if (!res.ok) throw new Error(await res.text());

        if (selectedIdentityId === identityId) {
          selectedIdentityId = "";
          persistSessionConfigDraft();
        }
        await refreshIdentities();
        setStatus(t("statusDeleted"), true);
      } catch (e) {
        alert(t("alertDeleteFailed", { msg: e.message || e }));
        setStatus(t("statusDeleteFailed"), false);
      } finally {
        setBusy(false);
      }
    }

    async function refreshIdentities() {
      const data = await fetchJSON("/api/identities");
      identitiesCache = data.identities || [];
      if (
        selectedIdentityId &&
        !identitiesCache.some((identity) => identity.identity_id === selectedIdentityId)
      ) {
        selectedIdentityId = "";
        persistSessionConfigDraft();
      }
      renderIdentityList(identitiesCache);
    }

    async function fetchRuntimeStatus() {
      return await fetchJSON("/api/session/runtime-status");
    }

    async function uploadIdentity() {
      const file = identityFileEl.files[0];
      if (!file) {
        alert(t("alertChooseImage"));
        return;
      }
      showBlockingModal(t("statusInitIdentity"));
      setBusy(true);
      try {
        const fd = new FormData();
        fd.append("image", file);
        fd.append("name", identityNameEl.value || "");
        const res = await fetch(resolveBackendUrl("/api/identities/upload"), { method: "POST", body: fd });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        selectedIdentityId = data.identity.identity_id;
        identityFileEl.value = "";
        renderFilePickerLabel();
        await refreshIdentities();
        persistSessionConfigDraft();
        setStatus(t("statusIdentityReady"), true);
      } catch (e) {
        alert(t("alertUploadFailed", { msg: e.message || e }));
        setStatus(t("statusInitFailed"), false);
      } finally {
        hideBlockingModal();
        setBusy(false);
      }
    }

    async function startLocalAudioStream(socket, isRejected) {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
      });
      if (isRejected() || ws !== socket || socket.readyState !== WebSocket.OPEN) {
        stopAudioPipeline();
        return;
      }
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      playbackGainNode = audioContext.createGain();
      playbackGainNode.gain.value = isMuted ? 0 : 1;
      playbackGainNode.connect(audioContext.destination);
      audioPlayCursorSec = audioContext.currentTime + 0.08;

      source = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(2048, 1, 1);
      processor.onaudioprocess = (e) => {
        if (isRejected() || ws !== socket || socket.readyState !== WebSocket.OPEN || !audioContext) return;
        const input = e.inputBuffer.getChannelData(0);
        const mono16k = downsampleBuffer(input, audioContext.sampleRate, 16000);
        const i16 = int16FromFloat32(mono16k);
        socket.send(i16.buffer);
      };
      source.connect(processor);
      processor.connect(audioContext.destination);
      setRealtimeRunning(true);
      setStatus(t("statusConnected"), true);
    }

    async function startRealtime() {
      if (isRealtimeRunning || uiBusy || isSelfTestRunning || isSpeakerTestPlaying) return;
      setBusy(true);
      setStatus(t("statusConnecting"), false);
      try {
        const runtime = await fetchRuntimeStatus();
        if (runtime.busy) {
          setStatus(t("statusResourceBusy"), false);
          setBusy(false);
          alert(t("alertResourceBusy"));
          return;
        }

        persistSessionConfigDraft();

        const socket = new WebSocket(resolveBackendWebSocketUrl("/ws"));
        ws = socket;
        socket.binaryType = "arraybuffer";
        let sessionRejected = false;
        let sessionInitialized = false;

        socket.onopen = () => {
          try {
            socket.send(JSON.stringify({
              type: "start",
              config: getSessionConfigDraft(),
            }));
          } catch (e) {
            sessionRejected = true;
            setStatus(t("statusError"), false);
            try { socket.close(); } catch (_) {}
          }
        };

        socket.onmessage = (event) => {
          if (ws !== socket) return;
          if (typeof event.data === "string") {
            try {
              const meta = JSON.parse(event.data);
              if (meta.type === "busy") {
                sessionRejected = true;
                stopAudioPipeline();
                setStatus(t("statusResourceBusy"), false);
                alert(t("alertResourceBusy"));
                try { socket.close(); } catch (_) {}
                return;
              }
              if (meta.type === "error") {
                sessionRejected = true;
                stopAudioPipeline();
                if (meta.code === "identity_load_failed") {
                  setStatus(t("statusIdentityLoadFailed"), false);
                  alert(t("alertIdentityLoadFailed", { msg: meta.detail || "-" }));
                } else {
                  setStatus(t("statusError"), false);
                  alert(t("alertStartFailed", { msg: meta.detail || meta.code || "unknown" }));
                }
                try { socket.close(); } catch (_) {}
                return;
              }
              if (meta.type === "init") {
                llmAudioSampleRate = meta.audio_sample_rate || 16000;
                if (meta.model) {
                  selectedModelId = String(meta.model);
                }
                if (meta.voice) {
                  selectedVoiceId = String(meta.voice);
                  renderVoiceTrigger();
                }
                if (meta.mode && MODE_OPTIONS.includes(String(meta.mode))) {
                  currentMode = String(meta.mode);
                  renderModeOptions();
                }
                renderModelTrigger();
                persistSessionConfigDraft();
                if (!sessionInitialized) {
                  sessionInitialized = true;
                  startLocalAudioStream(socket, () => sessionRejected)
                    .catch((e) => {
                      sessionRejected = true;
                      setStatus(t("statusMicFailed"), false);
                      try { socket.close(); } catch (_) {}
                    })
                    .finally(() => {
                      if (ws === socket) {
                        setBusy(false);
                      }
                    });
                }
                return;
              }
              if (meta.type === "stats") {
                statsBufferFrames = String(meta.buffer_frames ?? "-");
                runtimeModeCode = String(meta.mode || "idle");
                renderStats();
              }
            } catch (_) {}
            return;
          }

          if (sessionRejected || !audioContext) return;
          const bytes = new Uint8Array(event.data);
          const msgType = bytes[0];
          if (msgType !== 3) return;

          const dv = new DataView(event.data);
          const audioLen = dv.getUint32(9, true);
          const frameLen = dv.getUint32(13, true);
          const audioStart = 17;
          const audioEnd = audioStart + audioLen;
          const frameEnd = audioEnd + frameLen;
          if (frameEnd > bytes.length) return;

          const audioBytes = event.data.slice(audioStart, audioEnd);
          const pcm = new Int16Array(audioBytes);
          let frameDelayMs = 0;
          if (pcm.length > 0) {
            const f32 = new Float32Array(pcm.length);
            for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768.0;
            const buf = audioContext.createBuffer(1, f32.length, llmAudioSampleRate);
            buf.copyToChannel(f32, 0, 0);
            const srcNode = audioContext.createBufferSource();
            srcNode.buffer = buf;
            srcNode.connect(playbackGainNode || audioContext.destination);
            const nowSec = audioContext.currentTime;
            if (audioPlayCursorSec < nowSec + 0.03) {
              audioPlayCursorSec = nowSec + 0.03;
            }
            const packetStartSec = audioPlayCursorSec;
            srcNode.start(packetStartSec);
            frameDelayMs = Math.max(0, (packetStartSec - nowSec) * 1000.0);
            audioPlayCursorSec += buf.duration;
          }

          const jpeg = bytes.slice(audioEnd, frameEnd);
          const blob = new Blob([jpeg], { type: "image/jpeg" });
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            setTimeout(() => {
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              URL.revokeObjectURL(url);
            }, frameDelayMs);
          };
          img.src = url;
        };

        socket.onclose = () => {
          if (ws !== socket) return;
          stopAudioPipeline();
          const byUser = manualStopping;
          const rejected = sessionRejected;
          manualStopping = false;
          setRealtimeRunning(false);
          setBusy(false);
          if (!rejected) {
            setStatus(byUser ? t("statusStopped") : t("statusClosed"), byUser);
          }
          ws = null;
        };
        socket.onerror = () => {
          if (ws !== socket) return;
          setStatus(t("statusError"), false);
        };
      } catch (e) {
        alert(t("alertStartFailed", { msg: e.message || e }));
        setBusy(false);
      }
    }

    function stopRealtime() {
      if (!ws) return;
      manualStopping = true;
      setStatus(t("statusStopping"), false);
      if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
        ws.close();
      }
    }

    function closeRealtimeForPageExit() {
      if (ws) {
        try {
          ws.close();
        } catch (_) {}
      }
      stopAudioPipeline();
      ws = null;
      if (selfTestWs) {
        try { selfTestWs.close(); } catch (_) {}
      }
      stopSelfTestAudioPipeline();
      selfTestWs = null;
      isSelfTestRunning = false;
      selfTestStatusCode = "idle";
      selfTestErrorMessage = "";
      selfTestLocalLevel = 0;
      selfTestServerLevel = 0;
      if (speakerTestAudio) {
        speakerTestAudio.pause();
        speakerTestAudio.src = "";
      }
      speakerTestAudio = null;
      isSpeakerTestPlaying = false;
      speakerTestStatusCode = "idle";
      speakerTestErrorMessage = "";
    }

    uploadBtn.addEventListener("click", uploadIdentity);
    micSelfTestBtnEl.addEventListener("click", () => {
      if (isSelfTestRunning) stopMicSelfTest();
      else startMicSelfTest();
    });
    speakerSelfTestBtnEl.addEventListener("click", () => {
      toggleSpeakerSelfTest();
    });
    sessionBtn.addEventListener("click", () => {
      if (isRealtimeRunning) stopRealtime();
      else startRealtime();
    });
    muteBtn.addEventListener("click", () => {
      if (!isRealtimeRunning) return;
      setMuted(!isMuted);
    });
    identityFileBtnEl.addEventListener("click", () => {
      if (identityFileBtnEl.disabled) return;
      identityFileEl.click();
    });
    identityFileEl.addEventListener("change", () => {
      renderFilePickerLabel();
    });
    modelPickerBtnEl.addEventListener("click", () => {
      openPicker("model");
    });
    voicePickerBtnEl.addEventListener("click", () => {
      openPicker("voice");
    });
    modeSegmentedEl.addEventListener("click", (event) => {
      const btn = event.target.closest(".mode-chip");
      if (!btn || btn.disabled) return;
      const mode = btn.dataset.mode || "";
      if (!MODE_OPTIONS.includes(mode) || mode === currentMode) return;
      currentMode = mode;
      renderModeOptions();
      persistSessionConfigDraft();
    });
    pickerBackdropEl.addEventListener("click", closePicker);
    pickerCloseBtnEl.addEventListener("click", closePicker);
    langToggleBtn.addEventListener("click", () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("demo_lang", currentLang);
      applyLanguage();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && activePickerKind) closePicker();
    });
    window.addEventListener("pagehide", closeRealtimeForPageExit);
    window.addEventListener("beforeunload", closeRealtimeForPageExit);

    applyLanguage();

    (async () => {
      await initializeAppData();
    })();
  </script>
</body>
</html>
